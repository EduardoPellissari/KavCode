services:
  - type: web
    name: kavcode-site
    runtime: static
    plan: free
    buildCommand: ""
    staticPublishPath: .
    previews:
      generation: automatic
    envVars:
      - key: SKIP_INSTALL_DEPS
        value: "true"
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /styles.css
        name: Cache-Control
        value: no-cache
      - path: /script.js
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
